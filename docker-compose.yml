name: project-scientist

services:
  project-scientist:
    build:
      context: .
      target: runtime
    image: project-scientist:dev-local
    container_name: project-scientist-dev
    ports:
      - "127.0.0.1:8097:8080"
    environment:
      PSC_ADDR: ":8080"
      PSC_DATA_DIR: "/data"
    volumes:
      - project-scientist-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  project-scientist-test:
    build:
      context: .
      target: test
    image: project-scientist:test-local
    profiles:
      - test

volumes:
  project-scientist-data:
