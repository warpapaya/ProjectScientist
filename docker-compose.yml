name: ${COMPOSE_PROJECT_NAME:-project-scientist}

services:
  project-scientist:
    build:
      context: .
      target: runtime
      args:
        GO_PARALLEL: ${PSC_DOCKER_GO_PARALLEL:-2}
    image: ${PSC_IMAGE_TAG:-project-scientist:dev-local}
    ports:
      - "127.0.0.1:${PSC_DEV_PORT:-8097}:8080"
    environment:
      PSC_ADDR: ":8080"
      PSC_DATA_DIR: "/data"
      PSC_ENABLE_DEMO_RESET: "true"
      PSC_SYNTHETIC_FIXTURE_PATH: "/app/fixtures/mvp_synthetic_lab.json"
    volumes:
      - project-scientist-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  project-scientist-test:
    build:
      context: .
      target: test
      args:
        GO_PARALLEL: ${PSC_DOCKER_GO_PARALLEL:-1}
        GO_MEM_LIMIT: ${PSC_TEST_GO_MEM_LIMIT:-512MiB}
    image: ${PSC_TEST_IMAGE_TAG:-project-scientist:test-local}
    environment:
      GOMAXPROCS: ${PSC_DOCKER_GO_PARALLEL:-1}
      GOMEMLIMIT: ${PSC_TEST_GO_MEM_LIMIT:-512MiB}
      GOFLAGS: -p=${PSC_DOCKER_GO_PARALLEL:-1}
    profiles:
      - test

volumes:
  project-scientist-data:
